name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v2.3.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          fetch-depth: 0
          persist-credentials: false

      - name: Generate release body
        run: |
          VERSION="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          cat > /tmp/release-body.md << 'EOF'
          ## Word2Card $VERSION

          ### Installation

          **Linux:**
          - **AppImage**: Download `Word2Card-$VERSION.AppImage`, make it executable, and run
          - **Debian/Ubuntu**: Download and install `word2card_$VERSION_amd64.deb`

          **Windows:**
          - Download and run `Word2Card-Setup-$VERSION.exe`

          ### Changes

          See the [full changelog](https://github.com/${{ github.repository }}/compare/v2.3.0...$VERSION)

          ---

          **Note:** This is a draft release. Review the assets and publish when ready.
          EOF
          sed -i "s/\$VERSION/$VERSION/g" /tmp/release-body.md

      - name: Create draft release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          draft: true
          prerelease: ${{ contains(github.ref, 'RC') || contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          body_path: /tmp/release-body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux assets
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [create-release]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Build Linux packages
        run: npx electron-builder --linux AppImage deb --publish never

      - name: Upload release assets
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          gh release upload "$TAG" dist/*.AppImage dist/*.deb --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows assets
    runs-on: windows-latest
    timeout-minutes: 30
    needs: [create-release]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Build Windows installer
        run: npx electron-builder --windows nsis --publish never

      - name: Upload release assets
        run: |
          $TAG = "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          gh release upload "$TAG" dist/*.exe dist/*.blockmap dist/latest.yml --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
