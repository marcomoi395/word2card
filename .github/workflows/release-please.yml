name: Release Please

on:
    push:
        branches:
            - main

permissions:
    contents: write
    issues: write
    pull-requests: write

jobs:
    release-please:
        runs-on: ubuntu-latest
        environment: RELEASE_PLEASE
        steps:
            - name: Run release-please
              uses: googleapis/release-please-action@v4
              with:
                  token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
                  release-type: node
