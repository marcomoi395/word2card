name: Release Smoke

on:
  workflow_dispatch:
    inputs:
      ref_name:
        description: Git tag or commit to build
        required: true
        type: string

permissions:
  contents: read

jobs:
  smoke:
    uses: ./.github/workflows/reusable-build-assets.yml
    with:
      ref_name: ${{ inputs.ref_name }}
      upload_to_release: false
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
